        /* Pull quotes — editorial style */
        .pull-quote { margin: 3.5rem 0; padding: 2rem 2.5rem; border-left: 3px solid var(--accent); background: var(--accent-subtle); font-size: 1.12rem; font-weight: 400; font-style: italic; color: var(--text); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

        /* Slogan — centerpiece motto */
        .slogan { margin: 3rem 0; padding: 2.5rem 2rem; text-align: center; background: linear-gradient(135deg, var(--accent-subtle) 0%, rgba(37,99,235,0.08) 100%); border: 1px solid rgba(37,99,235,0.15); border-radius: var(--radius-md); }

        .part-divider { margin: 5rem -4.5rem 4rem; padding: 3rem 4.5rem; background: var(--surface2); border-top: 2px solid var(--border-strong); border-bottom: 2px solid var(--border-strong); text-align: center; }
        .part-divider .part-label { font-family: var(--font-heading); font-size: 0.65rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.5rem; }

## Güneşin Söylediği Saat

Binlerce yıl boyunca insanlar tek bir kurala güvendi: güneş tam tepedeyken öğle. Her şehir, her köy kendi güneşine bakardı. Bağdat'ın öğlesi ile İstanbul'un öğlesi farklıydı — ama kimsenin umurunda değildi. Çünkü bir haberci at sırtında günlerce seyahat ediyor ve "birkaç dakikalık fark" kimsenin dünyasını değiştirmiyordu.

## Her İstasyonun Saati Farklı

1830'larda buharlı tren Avrupa ve Amerika'yı fethetti. Ve bir anda "yerel öğle" sistemi çöktü.

Hayal edin: İngiltere'de Bristol'dan Londra'ya tren seferi var. Bristol, Londra'dan 11 dakika geride. Saat farklılıkları yüzünden yolcular trenleri kaçırıyor, hat çakışmaları oluyor, kazalar yaşanıyor.

Her istasyonun duvarında farklı bir saat asılı. Makinist Londra saatine göre yola çıkıyor; yolcu Bristol saatine göre perona geliyor.

Çözüm 1847'de geldi: İngiliz demiryolları **Railway Time** adı altında tüm hatlarında Greenwich saatini (GMT) zorunlu kıldı. 1880'de tüm Britanya bunu resmi kabul etti.

Ama dünya çapında kaos devam ediyordu. ABD'de 1883'te **300'den fazla yerel saat** vardı. Demiryolu şirketleri kendi aralarında 4 bölge belirledi — ama yasal değildi.

## Greenwich'ten Başlıyor Her Şey

1884, Washington. 25 ülkenin delegesi bir araya geldi: **Uluslararası Meridyen Konferansı.** Amaç: tüm dünya için tek bir referans noktası belirlemek.

Oylamayla Londra'nın güneydoğusundaki Greenwich Rasathanesi'nden geçen çizgi, **0° başlangıç meridyeni** kabul edildi. Fransa çekimser kaldı (Paris meridyenini savunuyordu), ama sonunda herkes Greenwich'e razı oldu.

Kural basittir: her 15 derecelik meridyen dilimi bir saate eşittir. Doğuya gittikçe saat ileri (+), batıya gittikçe geri (−). Toplam 24 dilim, 24 saat.

Kulağa temiz ve zarif geliyor, değil mi? Şunu deneyin: Temmuz'da İstanbul'da öğlen 12:00. Berlin'deki arkadaşınıza "saat kaç?" diye sorun — cevap 11:00. Aynı soruyu Ocak'ta sorun: Berlin bu sefer 10:00 diyor. Aradaki fark **bir saatten iki saate çıktı.** Ne değişti? Türkiye artık yaz-kış geçişi yapmıyor, ama Almanya yapıyor.

<div class="pull-quote">Aynı iki şehir arasındaki saat farkı bile <em>yılın farklı zamanlarında değişebilir.</em></div>

Problem şu: bu teori gerçek dünyayla tanıştığında çöküyor. Çünkü **zaman dilimleri fizik değil, politikadır.**

## Saat Kaçta Uyandığınızı Politikacılar Belirliyor

Zaman dilimleri bir kere belirlenip sonsuza kadar sabit kalan şeyler değil. Ülkeler, bazen oldukça sürpriz sebeplerle, saatlerini değiştirebilir.

### Türkiye: Bir Saatlik Kaos Kronolojisi

2016'dan önce Türkiye GMT+2'deydi. Yaz gelince saatler bir ileri alınır, kış gelince geri alınırdı — tıpkı Avrupa gibi.

Sonra olan oldu:

- **1940** — Bakanlar Kurulu kararıyla yaz saati uygulaması resmen başladı
- **1952–1961** — Uygulama askıya alındı
- **1965–1972** — Tekrar askıya alındı, sonrasında aralıksız devam edildi
- **2008** — Enerji Bakanlığı GMT+2,5 zaman dilimi önerdi. İlerleme olmadı.
- **2013** — Enerji Bakanlığı uygulamanın kaldırılması yönünde karar aldı
- **2015** — Yaz saatinden çıkış, 1 Kasım seçimleri yüzünden ertelendi. Evet, bir *seçim* yüzünden tüm ülkenin saati bir hafta farklı kaldı.
- **8 Eylül 2016** — Bakanlar Kurulu kararıyla yaz saati kalıcı hâle getirildi (GMT+3)
- **14 Eylül 2017** — Danıştay kararı durdurdu
- **23 Ekim 2017** — Bakanlar Kurulu yeniden devam kararı aldı
- **2 Ekim 2018** — Son nokta: yaz saati uygulaması kalıcı hâle geldi

Dikkat edin: yaz saati uygulamasından *vazgeçilmedi* — tam tersi, **kalıcı olarak yaz saatine geçildi.**

### Bu Sadece Türkiye'ye Özgü Değil

Son yıllarda benzer kararlar alan başka ülkeler de var:

- **Grönland (Mart 2023)** — Kalıcı yaz saatine geçti (UTC−02:00). Artık saat değiştirmiyor.
- **Ukrayna (Temmuz 2024)** — DST'yi kaldırdı, son geçiş 27 Ekim 2024'te yapıldı. Kalıcı UTC+2 (EET).
- **Rusya (2014)** — Önce kalıcı yaz (2011), sonra kalıcı kış (2014). Moskova: UTC+3.

Bütün bunlar bir gerçeği perçinliyor: zaman dilimleri *hiçbir zaman* "tamamlanmış" bir konu değil. Ve bu durum, tüm dünyada herhangi bir ülkede tekrar gerçekleşebilir. Peki bu kadar değişken bir şeyi nasıl standartlaştıracağız?

## UTC: Herkesin Anlaştığı Tek Nokta

GMT'nin sorunu şuydu: Dünya'nın dönüşüne dayanıyordu ve bu dönüş mükemmel değildi. Atom saatleri devreye girince, çok daha kesin bir referans mümkün hâle geldi: **UTC (Koordineli Evrensel Zaman).**

UTC, iki şeyin birleşimidir:

- **Uluslararası Atom Saati (TAI)** — Dünya genelinde ~400 süper hassas atom saatinin ortalaması. Kesin hızı sağlar.
- **Evrensel Zaman (UT1)** — Dünya'nın gerçek dönüş hızı. Gelgitler ve jeofiziksel süreçler nedeniyle düzensizdir.

Bu ikisinin kombinasyonu, UTC'nin hem doğru hem de Dünya'nın dönüşüyle uyumlu kalmasını sağlar. 1960'ta kavram resmileşti, 1967'de adı benimsendi. O günden bu yana **GMT artık bir standart değil, sadece bir zaman dilimi adıdır** (UTC+0 ile eşdeğer).

| Kavram | Ne İfade Eder | Bugünkü Kullanımı |
|--------|--------------|-------------------|
| **GMT** | Dünya'nın dönüşüne dayalı eski standart | Sadece bir zaman dilimi adı (UTC+0) |
| **UTC** | Atom saati + Dünya dönüşü | Küresel standart |
| **TAI** | Saf atomik ölçüm | Bilimsel referans (UTC'den 37 saniye ileride) |
| **Zulu (Z)** | UTC'nin askeri kısaltması | Havacılık, NATO |

Ama bir sorun var: Dünya'nın dönüşü yavaşlıyor. Atom saatleri mükemmel tempo tutarken, gezegen geride kalıyor. Bu farkı kapatmak için UTC'ye ara sıra bir saniye ekleniyor — **saniye atlaması (leap second).** Eğer Dünya'nın dönüşü yavaşlıyorsa pozitif bir saniye eklenir; negatif saniye (çıkarma) teorik olarak mümkün ama şimdiye kadar hiç yapılmadı.

1972'den bu yana toplam **27 kez** eklendi. Son eklenen: 31 Aralık 2016. O günden bu yana — 10 yıl — hiç eklenmedi.

<div class="callout callout-warn">
<strong>⚠️ 2035: Leap Second'ın Sonu Geliyor</strong><br><br>
18 Kasım 2022'de Genel Ağırlıklar ve Ölçüler Konferansı (CGPM), <strong>Resolution 4</strong> ile leap second mekanizmasının 2035'te veya öncesinde sona ereceğini kararlaştırdı. WRC-23 (Dubai, Aralık 2023) bu kararı resmen tanıdı. 28. CGPM (2026) yeni limitleri onaylayacak.<br><br>
Neden kaldırılıyor? Çünkü tek bir saniyelik atlama, Reddit'i çökertecek, Cloudflare'ı durduracak, havalimanlarını geciktirecek kadar tehlikeli olabiliyor. Sadece 6 ay öncesinden duyuruluyor — öngörülemez. Google ve Amazon "leap smear" ile kendi çözümlerini üretmek zorunda kalmıştı. 2035'ten sonra bu sorunla uğraşmak tarih olacak.
</div>

<p class="section-hook">UTC standardımız oldu. Ama yaz-kış saati uygulamaları hâlâ bir gerçek. Avrupa'da bu konuda yıllardır devam eden bir tartışma var — sonucu hâlâ belirsiz.</p>

<div class="era-marker"><span class="era-badge">🔄 Yaz Saati — Bitmeyen Tartışma</span></div>

## Yaz Saati: Avrupa'nın Bitmeyen Tartışması

Birçok ülke yaz aylarında saatlerini bir ileri alır: daha uzun akşamlar, daha fazla gün ışığı. Avrupa'da bu, CET (UTC+1) ile CEST (UTC+2) arasında gidip gelme demek:

| Kısaltma | Tanım | UTC Offset | Dönem |
|----------|-------|-----------|-------|
| CET | Central European Time | UTC+1 | Kış (Kasım–Mart) |
| CEST | Central European Summer Time | UTC+2 | Yaz (Mart–Ekim) |

CEST yerine CEDT, ECST veya MESZ de görebilirsiniz. Adı ne olursa olsun, UTC+2 olması yeterli — Greenwich'ten 2 saat ileride.

2018'de Avrupa Komisyonu tarihi bir anket yaptı: 4,6 milyon kişi katıldı, **%84'ü saat değişikliğinin kaldırılmasını** istedi. Mart 2019'da Parlamento onayladı. Ama her ülke kalıcı yaz mı kış mı istediğini seçmek zorunda — ve kimse anlaşamıyor.

**Mayıs 2026 itibarıyla:** Konsey onayı hâlâ yok. Ekim 2025'te EP plenerde tartışıldı, somut tarih verilmedi. Süreç "tamamen bloke." IANA'nın uyarısı geçerli: "1 yıldan az sürede bazı bilgisayar saatleri hatalı çalışabilir."

Bazı ülkeler beklemedi: Türkiye (2016, kalıcı yaz), Rusya (2014, kalıcı kış), Ukrayna (2024, kalıcı kış), Grönland (2023, kalıcı yaz).

<p class="section-hook">Tüm bu kaos — farklı ülkelerin farklı zamanlarda farklı kararlar alması — yazılım dünyasında ne tür sorunlar yaratıyor?</p>

<div class="era-marker"><span class="era-badge">⚠️ Yanılgılar — Karanlık Odada Lego</span></div>

## Sanıyorsunuz ki Zaman Dilimleri Basit...

Yazılıma geçmeden, yaygın yanılgıları temizleyelim. Bunları bilmeden geliştirme yapmak, karanlık odada lego basmaya benziyor:

**"GMT = UTC = Zulu, hepsi aynı"** — Çok yakın ama aynı değil. Üçü de 0° meridyeni referans alır, yaz saati uygulamaz. Fark: GMT eski standarttı (dönüşe dayalı); UTC atomik hassasiyetle modern versiyonu; Zulu ise UTC'nin havacılık/askeri kısaltması. Bugün **UTC tercih edilen standarttır.**

**"Offsetler ±12 ile sınırlı"** — Hayır. UTC+13 ve UTC+14 de var. Pasifik adaları tarih çizgisinin "doğru tarafında" kalmak için bunları kullanıyor.

**"Her offset tam saat"** — Hayır:

| Ülke | Offset |
|------|--------|
| İran | UTC+3:30 |
| Hindistan | UTC+5:30 |
| Nepal | UTC+5:45 |
| Chatham Adaları (Yeni Zelanda) | UTC+12:45 |

**"DST her yerde aynı tarihte başlar"** — Hayır. Güney Yarımküre'de yaz zıt aylarda. ABD'deki Navajo Ulusu gibi kısmi uyumlar da var.

**"CST güvenilir bir kısaltma"** — Kesinlikle hayır. Beş farklı anlamı var:

| Kısaltma | Temsil Ettiği |
|----------|--------------|
| CST | Central Standard Time (Kuzey Amerika) |
| CST | Central Standard Time (Avustralya) |
| CST | Central Summer Time (Avustralya) |
| CST | China Standard Time |
| CST | Cuba Standard Time |

**"Büyük ülke = çok dilim"** — Her zaman değil. Çin 4 meridyeni kaplar ama tek saat kullanır.

**Kural:** Kısaltmalara hiçbir zaman güvenmeyin. Yalnızca IANA tanımlayıcıları (\`Europe/Istanbul\`) veya UTC offset (\`UTC+03:00\`) kullanın.

## Herkesin Konuştuğu Format: ISO 8601

Tarihleri ve saatleri kaydetmenin evrensel formatı: **ISO 8601** (1988). Amacı: tarihlerin farklı ülkelerde yanlış yorumlanmasını önlemek.

Temel ilkesi: **büyükten küçüğe** sırala. Yıl → ay → gün → saat → dakika → saniye. Her değer sabit haneli, başında sıfır ile doldurulur.

İki biçim: temel (\`20090106\`) ve genişletilmiş (\`2009-01-06\`). Azaltılmış hassasiyet de mümkün: \`2004-05\` geçerli (Mayıs 2004).

<div class="era-marker"><span class="era-badge">💻 Dijital Çağ — Yazılım vs Zaman</span></div>

## Yazılım Dünyasında Zaman: Tek Bir Kural

Dünyanın neresinde olursanız olun — hepimiz aynı anı yaşıyoruz. Sadece onu farklı rakamlarla ifade ediyoruz.

<div class="pull-quote">Tek bir "şu an" var. Saatler sadece <em>etiketler</em>.</div>

Ama iş bilgi teknolojilerine geldiğinde, bu basit gerçek birçok değişkenle karmaşıklaşır:

- Kullanıcı Tercihleri (User Profiles)
- Tarayıcı Varsayılanları (Browser Default Settings)
- İstek Başlıkları (Request Headers)
- Oturum Bilgileri (Session Data)
- Ortam / Sistem Değişkenleri (Environment Variables)

"Saat kaç?" sorusunu doğru yanıtlamak için üç şeyi bilmelisiniz:

1. Saat UTC olarak kaç?
2. Bu soru hangi zaman dilimi için soruldu?
3. Soruyu soran kişinin zaman dilimi ne?

<div class="slogan">
<div class="slogan-text"><span class="slogan-highlight">Global</span> Kaydet, <span class="slogan-highlight">Yerel</span> Görüntüle</div>
<div class="slogan-sub">Tek kural. Zamanı UTC olarak sakla, kullanıcının diliminde göster.</div>
</div>

Örnek: İstanbul'da saat 17:00'de bir işlem yapıldı. Bu işlemi Tokyo'daki kullanıcı 23:00, New York'taki 10:00 olarak görmeli — ama hepsi aynı **anı** ifade etmeli.

Daha karmaşık hâli: *"Tokyo'da iş gezisinde bulunan New York'lu bir kullanıcı, İstanbul'da yapılan işlemin saatini, işlemin gerçekleştirildiği yerel bilgiyle birlikte nasıl görmeli?"*

**I18n (Uluslararasılaştırma)** dünyasının önerdiği adımlar:

1. **Zaman bilgisini mutlaka UTC olarak kaydedin**
2. **Kullanıcıların profillerinde zaman dilimi bilgilerini tutun**
3. **Mümkünse tarih/zaman bilgisini sunucuda (UTC olarak) oluşturun**
4. **Tüm sistem bileşenlerinin** (OS, framework, runtime, DB) **varsayılan TimeZone değeri UTC olsun**
5. **Önemli** — İşlemin gerçekleştiği zaman dilimini (IANA ID) de kaydedin. Offset tek başına yetmez — aşağıdaki "Offset ≠ Time Zone" bölümüne bakın.
6. **Duruma göre** — Yerel duvar saatini de kaydedin ("Bu işlem günün hangi saatlerinde yapılıyor?" sorusu yerel saatle daha anlamlıdır). Özellikle gelecek zamanlı kayıtlarda zorunlu.

Pratik örnek — aynı anı 3 farklı yerde göstermek:

\`\`\`javascript
// Tek bir anı (UTC) farklı zaman dilimlerinde görüntüleme
const event = new Date('2026-07-19T20:00:00Z'); // Final başlangıcı UTC

const fmt = (tz) => event.toLocaleString('tr-TR', { timeZone: tz, hour: '2-digit', minute: '2-digit' });

console.log(fmt('America/New_York'));  // 16:00 (yerel)
console.log(fmt('Europe/Istanbul'));   // 23:00
console.log(fmt('Asia/Tokyo'));        // 05:00 (+1 gün)
\`\`\`

<div class="era-marker"><span class="era-badge">🔢 Tipler — Doğru Araç, Doğru İş</span></div>

## Zaman Tipleri: Epoch, DateTime, DateTimeOffset

### Unix Epoch ve Timestamp

Bilgisayarlar zamanı genellikle tek bir sayı olarak ifade eder: **Unix timestamp** — 1 Ocak 1970 00:00:00 UTC'den itibaren geçen saniye sayısı. Zaman dilimi bilgisi taşımaz, her yerde aynı anı temsil eder.

| Temsil | Değer | Anlam |
|--------|-------|-------|
| Unix timestamp | \`1721404800\` | 19 Temmuz 2024 12:00 UTC |
| ISO 8601 | \`2024-07-19T12:00:00Z\` | Aynı an, okunabilir |
| .NET Ticks | \`638565648000000000\` | Aynı an, 100ns hassasiyet |

**Y2K38 uyarısı:** 32-bit Unix timestamp 19 Ocak 2038'de taşacak. Bugün başlayan projelerde 64-bit zaman kullanın.

### DateTime vs DateTimeOffset (.NET)

.NET'te en sık yapılan hata: \`DateTime\` ile \`DateTimeOffset\` arasındaki farkı bilmemek.

\`\`\`csharp
// ❌ DateTime — offset bilgisi YOK, anlam belirsiz
DateTime ambiguous = new DateTime(2026, 7, 19, 17, 0, 0);
// Bu 17:00 UTC mi? İstanbul mu? Tokyo mu? Belli değil.

// ✅ DateTimeOffset — offset bilgisi taşır, anlam net
DateTimeOffset precise = new DateTimeOffset(2026, 7, 19, 17, 0, 0, TimeSpan.FromHours(3));
// 17:00+03:00 → İstanbul saati, UTC karşılığı 14:00Z

// ✅ UTC olarak kaydetme
DateTimeOffset utcNow = DateTimeOffset.UtcNow;  // Her zaman UTC
\`\`\`

| Tip | Offset Taşır | DB'de Güvenli | Ne Zaman Kullan |
|-----|:---:|:---:|------|
| \`DateTime\` | ❌ | ⚠️ | Sadece yerel UI gösterimi |
| \`DateTimeOffset\` | ✅ | ✅ | API, DB, event kayıtları |
| \`NodaTime.Instant\` | — | ✅ | Hassas zaman hesaplamaları |

### NodaTime: Daha Güvenli Bir Alternatif

Jon Skeet'in [NodaTime](https://nodatime.org/) kütüphanesi, .NET'in yerleşik zaman API'sinin belirsizliklerini ortadan kaldırır:

\`\`\`csharp
// NodaTime — açık ve güvenli
Instant now = SystemClock.Instance.GetCurrentInstant();
DateTimeZone zone = DateTimeZoneProviders.Tzdb["Europe/Istanbul"];
ZonedDateTime istanbul = now.InZone(zone);  // 2026-07-19T20:00:00+03:00

// DST geçişi sırasında belirsizlik? NodaTime sizi uyarır:
LocalDateTime ambiguous = new LocalDateTime(2024, 10, 27, 2, 30);
// Almanya'da bu saat iki kez yaşanır — NodaTime exception fırlatır
\`\`\`

NodaTime'ın avantajı: kendi IANA tzdata kopyasını NuGet paketi olarak taşır. OS güncellemesine bağımlı değilsiniz — \`NodaTime.TzdbCompiler\` ile istediğiniz IANA sürümünü pinleyebilirsiniz.

### Offset ≠ Time Zone

Bu, yazılımcıların en sık düştüğü tuzaklardan biridir:

| Kavram | Ne Taşır | Örnek |
|--------|----------|-------|
| **Offset** | Sadece şu anki UTC farkı | \`+03:00\` |
| **Time Zone (IANA ID)** | Tüm DST kuralları, geçmiş değişiklikler, gelecek planları | \`Europe/Istanbul\` |

\`UTC+03:00\` gördüğünüzde bu Türkiye mi, Suudi Arabistan mı, Moskova mı bilemezsiniz. Üçü de şu an +3'te — ama farklı geçmişleri ve farklı kuralları var.

\`\`\`csharp
// ❌ Offset kaydettiniz — gelecekte anlamsızlaşabilir
var record = new { Time = DateTimeOffset.Parse("2024-03-01T10:00:00+05:00") };
// Kazakistan Mart 2024'te +6'dan +5'e geçti.
// Bu kayıt değişiklik öncesi mi sonrası mı? Belli değil.

// ✅ IANA zone ID + instant birlikte saklayın
var record2 = new {
    Instant = Instant.FromUtc(2024, 3, 1, 5, 0),
    ZoneId = "Asia/Almaty" // kuralları taşır
};
// Artık bu anın hangi yerel saate denk geldiğini her zaman doğru hesaplayabilirsiniz.
\`\`\`

<div class="callout callout-warning">
<strong>⚠️ Kural:</strong> Offset kaydetmek <em>o anın</em> fotoğrafıdır. Zone ID kaydetmek <em>o yerin kurallarını</em> saklamaktır. İkincisi olmadan, geçmiş veya gelecekteki herhangi bir an için doğru yerel saati hesaplayamazsınız.
</div>

### Gelecek Zaman: UTC Kuralının İstisnası

"Global Kaydet, Yerel Görüntüle" kuralının bir istisnası var: **gelecek zamanlı kayıtlar.**

Senaryo: Kullanıcı "Her Pazartesi saat 10:00 İstanbul'da toplantı" diyor. Bunu \`UTC 07:00\` olarak saklarsanız:

- Türkiye yarın offset'ini değiştirirse (tekrar +2'ye dönse), toplantı yanlış saatte tetiklenir
- Kullanıcının niyeti "duvar saati ile 10:00" idi — UTC değil

| Zaman Türü | Nasıl Saklanmalı | Neden |
|-----------|-----------------|-------|
| Geçmiş olay (log, işlem) | UTC instant (\`Instant\` veya \`DateTimeOffset\`) | An sabit, asla değişmez |
| Gelecek randevu | Yerel saat + IANA zone ID (\`LocalDateTime\` + \`DateTimeZone\`) | Kurallar değişebilir, anı son anda hesapla |
| Tekrarlayan olay | Yerel saat + IANA zone ID + tekrar kuralı (RRULE) | Her tetiklemede güncel kurala göre UTC'ye çevir |

\`\`\`csharp
// NodaTime — gelecek randevu doğru yönetimi
var zone = DateTimeZoneProviders.Tzdb["Europe/Istanbul"];
var localMeeting = new LocalDateTime(2027, 3, 15, 10, 0); // "duvar saati 10:00"

// Hatırlatma gönderirken: o anki kurala göre instant hesapla
var zoned = localMeeting.InZoneLeniently(zone);
var utcInstant = zoned.ToInstant(); // Şu anki kurala göre UTC

// Eğer Türkiye 2027'de offset değiştirirse,
// bu kod yeni kuralla doğru UTC'yi üretir — çünkü LocalDateTime sakladık.
\`\`\`

<div class="callout callout-info">
<strong>💡 Özet:</strong> Geçmiş = instant (UTC) kaydet. Gelecek = yerel saat + zone ID kaydet, anı <em>tetikleme anında</em> hesapla. Bu ayrımı bilmeyen her sistem, DST veya offset değişikliği olduğunda hatalı bildirimler gönderir.
</div>

## İki Veritabanı, İki Dünya

Zaman dilimi bilgileri iki büyük veritabanında tutulur:

| Veritabanı | Kim Yönetiyor | Format | Güncelleme |
|-----------|--------------|--------|-----------|
| Microsoft Windows TZ | Microsoft | Registry | Windows Update |
| IANA/Olson (tzdata) | Topluluk + IANA | Text dosyaları | Yılda birkaç kez |

Cross-platform uygulamalarda hangisini kullanacağınızı iyi düşünün. Microsoft zamanla IANA tanımlarını da dahil etti ve iki veritabanı arasında çeviri olanağı sağladı.

### Microsoft'un Yaklaşımı

Windows, zaman dilimlerini Registry'de tutar:

\`\`\`
HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Time Zones
\`\`\`

**Artıları:** Windows ile entegre, otomatik güncelleme, .NET üzerinden kolay erişim, 2016'dan itibaren tüm dünyayı kapsar.

**Eksileri:** Standart kuruluş değil, geçmiş verileri tutarsız, aylık güncelleme, isimlendirme kafa karıştırıcı.

İsimlendirme örnekleri — yaratıcı diyelim:
- "Eastern Standard Time" — hem EST hem EDT'yi kapsıyor (yanıltıcı)
- "US Mountain Standard Time" — Arizona'nın sabit MST'si için
- "Romance Standard Time" — başka hiçbir veritabanında yok, Microsoft'a özgü
- "AUS Eastern Standard Time" vs "E. Australia Standard Time" — sadece DST farkı
- "Arab", "Arabian", "Arabic Standard Time" — üç farklı dilim, üç benzer isim

### IANA: Endüstri Standardı

## Çağımızın Derdi: "Çözdük" Dedikleri Sorunlar

Yukarıdaki tablo basit görünüyor: ".NET 6 her ikisini de destekliyor, sorun bitti." Gerçek bundan daha karanlık.

**.NET 6+ ve ICU Eşlemesi: Yarım Çözüm**

.NET 6'dan itibaren \`FindSystemTimeZoneById("Europe/Istanbul")\` Windows'ta da çalışıyor. Ama bu bir *çeviri*dir — altta hâlâ Windows Registry'deki zaman dilimi verisini kullanır. Eğer Windows Update yapılmamışsa veya eski bir Server image'ı üzerindeyseniz:

- Türkiye 2016'da DST'yi kaldırdı → güncellenmemiş sunucu hâlâ yaz/kış geçişi uygular
- Rusya 2014'te dilim değiştirdi → eski patch'siz makinelerde yanlış offset döner
- Mısır, Fas, Şili gibi sık kural değiştiren ülkeler için aynı risk geçerli

\`\`\`csharp
// .NET 6+ — her platformda çalışır (ICU mapping)
var tz = TimeZoneInfo.FindSystemTimeZoneById("Europe/Istanbul");

// AMA: Bu veri nereye dayanıyor?
// Windows → Registry (Windows Update'e bağlı)
// Linux   → /usr/share/zoneinfo (tzdata paketine bağlı)
// Docker  → Container image'ındaki tzdata versiyonuna bağlı
\`\`\`

**SQL Server: En Zayıf Halka**

SQL Server'ın \`AT TIME ZONE\` komutu doğrudan Windows Registry'yi okur:

\`\`\`sql
-- SQL Server: her zaman Windows TZ ID bekler
SELECT GETUTCDATE() AT TIME ZONE 'Turkey Standard Time';

-- Bu komutun doğru sonuç vermesi için:
-- 1. Host OS'un güncel Windows Update almış olması
-- 2. Registry'deki TZ verisinin doğru olması
-- 3. IANA ID desteklenmez (2026 itibarıyla hâlâ)
\`\`\`

Senaryo: Bir Windows Server 2019 üzerinde koşan SQL Server 2019. Sunucu "kararlı" diye patch uygulanmıyor. 2024'te Kazakistan iki dilimden tek dilime geçiyor — ama sizin sunucu bunu bilmiyor. O andan itibaren Kazakistan'daki müşterilerinizin işlem saatleri 1 saat kayık.

**Docker ve Cloud: Görünmez Tehlike**

\`\`\`dockerfile
# Alpine tabanlı .NET image — tzdata yüklü gelmez!
FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
# TimeZoneInfo.FindSystemTimeZoneById → TimeZoneNotFoundException

# Çözüm: tzdata paketini kendiniz ekleyin
RUN apk add --no-cache tzdata
\`\`\`

Cloud VM'lerde ve container'larda tzdata versiyonunun ne olduğu çoğu zaman kimsenin aklına gelmez — ta ki bir müşteri "saatler yanlış" diyene kadar.

<div class="callout callout-warning">
<strong>⚠️ Pratik sonuç:</strong> .NET 6'nın IANA desteği bir <em>API kolaylığı</em>dır, <em>veri doğruluğu garantisi</em> değildir. Doğruluk, alttaki OS/container'ın zaman dilimi verisinin güncelliğine bağlıdır. CI/CD pipeline'ınızda tzdata versiyonunu kontrol edin.
</div>

**Ne Yapmalı?**

| Katman | Risk | Önlem |
|--------|------|-------|
| .NET API sunucusu | OS tzdata eski | Windows Update politikasını zorunlu kıl, Docker'da tzdata pinle |
| SQL Server | Registry eski, IANA desteksiz | Tarih/saati UTC olarak sakla, dönüşümü uygulama katmanında yap |
| Frontend (JS) | Kullanıcının cihazındaki IANA verisi eski | \`Intl\` API'si runtime'a bağlı — kritik hesaplamaları backend'de yap |
| Mobil | OS güncellenmemiş | Aynı strateji — UTC sakla, yerel göster |

Kendi sisteminizde sadece şu üç format kullanın:

| # | Format | Örnek |
|---|--------|-------|
| 1 | IANA tanımlayıcısı | \`Europe/Istanbul\` |
| 2 | Microsoft tanımlayıcısı | \`Turkey Standard Time\` |
| 3 | UTC Offset | \`UTC+03:00\` |

Kısaltma **asla** kullanmayın. Tüm kısaltma listesi: [Wikipedia](https://en.wikipedia.org/wiki/List_of_time_zone_abbreviations)

## Test ve CI/CD Stratejisi

Zaman dilimi hataları sinsidir — çoğu zaman yalnızca belirli tarihlerde, belirli ülkelerdeki kullanıcılar için ortaya çıkar. Bunları yakalamak için sistematik bir test stratejisi şart.

### tzdata Versiyonunu CI'da Kontrol Etme

\`\`\`bash
# Linux/Docker — tzdata versiyonunu kontrol et
cat /usr/share/zoneinfo/tzdata.zi | head -1
# veya
dpkg -s tzdata | grep Version   # Debian/Ubuntu
apk info tzdata                  # Alpine

# Beklenen minimum versiyon kontrolü (CI script)
EXPECTED="2026b"
ACTUAL=$(cat /usr/share/zoneinfo/tzdata.zi | head -1 | grep -oP '\\d{4}[a-z]')
if [[ "$ACTUAL" < "$EXPECTED" ]]; then
  echo "⚠️ tzdata eski: $ACTUAL (beklenen: >= $EXPECTED)"
  exit 1
fi
\`\`\`

### DST Geçiş Anlarını Test Etme

\`\`\`csharp
// xUnit — DST sınır koşulları
[Theory]
[InlineData("2024-03-31T01:59:00+01:00", "Europe/Berlin", "2024-03-31T02:59:00+02:00")]
[InlineData("2024-10-27T02:30:00+02:00", "Europe/Berlin", "2024-10-27T02:30:00+01:00")]
public void DstTransition_ShouldResolveCorrectly(string input, string tzId, string expected)
{
    var dto = DateTimeOffset.Parse(input);
    var tz = TimeZoneInfo.FindSystemTimeZoneById(tzId);
    var converted = TimeZoneInfo.ConvertTime(dto, tz);
    Assert.Equal(DateTimeOffset.Parse(expected), converted);
}

// Belirli ülke kurallarını doğrula
[Fact]
public void Turkey_HasNoDst_Since2016()
{
    var tz = TimeZoneInfo.FindSystemTimeZoneById("Europe/Istanbul");
    var summer = new DateTimeOffset(2026, 7, 15, 12, 0, 0, TimeSpan.FromHours(3));
    var winter = new DateTimeOffset(2026, 12, 15, 12, 0, 0, TimeSpan.FromHours(3));

    // Türkiye'de yaz-kış farkı olmamalı
    Assert.Equal(summer.Offset, winter.Offset);
}
\`\`\`

### Docker Image'ında tzdata Pinleme

\`\`\`dockerfile
# Dockerfile — tzdata versiyonunu sabitle
FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine

# tzdata'yı belirli versiyonda yükle
RUN apk add --no-cache tzdata~=2026

# Health check'e tzdata versiyonu ekle
HEALTHCHECK CMD test -f /usr/share/zoneinfo/tzdata.zi
\`\`\`

### NodaTime ile Bağımsız Test

\`\`\`csharp
// NodaTime — OS'tan bağımsız, kendi TZDB ile test
var tzdb = DateTimeZoneProviders.Tzdb; // NuGet paketindeki versiyon
var zone = tzdb["Asia/Almaty"];

// Kazakistan 2024'te tek dilime geçti — bunu doğrula
var beforeChange = Instant.FromUtc(2024, 2, 29, 12, 0);
var afterChange = Instant.FromUtc(2024, 3, 1, 12, 0);

Assert.Equal(Offset.FromHours(6), zone.GetUtcOffset(beforeChange));
Assert.Equal(Offset.FromHours(5), zone.GetUtcOffset(afterChange));
\`\`\`

<strong>💡 Tavsiye:</strong> CI pipeline'ınıza haftalık bir "tzdata freshness check" ekleyin. IANA'nın <a href="https://data.iana.org/time-zones/releases/">releases sayfasını</a> RSS ile takip edin. Yeni bir release çıktığında (yılda 3-5 kez) container image'larınızı rebuild edin.
